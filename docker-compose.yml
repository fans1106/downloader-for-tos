services:
  hf-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    image: hf-downloader:latest
    container_name: hf-downloader
    restart: unless-stopped
    ports:
      - "${HF_DOWNLOADER_PORT:-8000}:8000"
    environment:
      HF_DOWNLOADER_HOST: 0.0.0.0
      HF_DOWNLOADER_PORT: 8000
      HF_DOWNLOADER_APP_SECRET: ${HF_DOWNLOADER_APP_SECRET:-u516}
      HF_DOWNLOADER_AUTH_PASSWORD: ${HF_DOWNLOADER_AUTH_PASSWORD:-c20250505}
      HF_DOWNLOADER_TOSUTIL_PATH: ${HF_DOWNLOADER_TOSUTIL_PATH:-/opt/tosutil/tosutil}
      HF_DOWNLOADER_TOSUTIL_CONFIG: ${HF_DOWNLOADER_TOSUTIL_CONFIG:-/opt/tosutil/.tosutilconfig}
      HF_DOWNLOADER_DEFAULT_BATCH_SIZE_GB: ${HF_DOWNLOADER_DEFAULT_BATCH_SIZE_GB:-800}
      HF_DOWNLOADER_DEFAULT_MAX_RETRIES: ${HF_DOWNLOADER_DEFAULT_MAX_RETRIES:-3}
      HF_DOWNLOADER_QUEUE_POLL: ${HF_DOWNLOADER_QUEUE_POLL:-2.0}
      HF_DOWNLOADER_LOG_LEVEL: ${HF_DOWNLOADER_LOG_LEVEL:-INFO}
    volumes:
      - /data/downloader4tos/data:/app/data
      - /data/downloader4tos/logs:/app/logs
      - /data/downloader4tos/downloads:/app/downloads
      - ${HF_DOWNLOADER_TOSUTIL_DIR:-/data/downloader4tos/util/}:/opt/tosutil:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
